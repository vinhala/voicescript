name: Build Docker Image and Update Service

on:
  workflow_call:
    inputs:
      dockerfile_path:
        required: true
        type: string
        description: 'Path to the directory containing the Dockerfile'
      image_name:
        required: true
        type: string
        description: 'Name of the Docker image'
      service_names:
        required: true
        type: string
        description: 'JSON array of stack service names to update with the built image'
      stack_name:
        required: true
        type: string
        description: 'Name of the stack to update'
    secrets:
      VM_HOST:
        required: true
      VM_USER_NAME:
        required: true
      VM_SSH_KEY:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase owner name
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.dockerfile_path }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max 
      - name: Update service on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.vm_host }}
          username: ${{ secrets.vm_user_name }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Login to GitHub Container Registry
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            
            # Pull the latest image
            docker pull --platform=linux/amd64 ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ github.sha }}
            
            echo '${{ inputs.service_names }}' | jq -r '.[]' | while IFS= read -r service_name; do
              docker service update \
                --detach \
                --image ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ github.sha }} \
                ${{ inputs.stack_name }}_${service_name}
            done
