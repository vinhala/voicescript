name: Update Images

on:
  workflow_dispatch:

jobs:
  process-services:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      matrix: ${{ steps.matrix-builder.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read services config
        id: read-services
        run: |
          content=$(cat infrastructure/services.json | jq -c .)
          echo "services=$content" >> $GITHUB_OUTPUT

      - name: Build matrix
        env:
          SERVICES: ${{ steps.read-services.outputs.services }}
        run: |
          # Create matrix directly from all services
          matrix=$(echo "{\"include\": $SERVICES}")
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
        id: matrix-builder

      - name: Debug matrix
        run: echo "${{ steps.matrix-builder.outputs.matrix }}"

  update-images:
    needs: [process-services]
    permissions:
      contents: read
      packages: write
    if: ${{ fromJSON(needs.process-services.outputs.matrix).include[0] }}
    strategy:
      matrix: ${{ fromJSON(needs.process-services.outputs.matrix) }}
    uses: ./.github/workflows/build-docker.yaml
    with:
      image_name: ${{ matrix.image }}
      dockerfile_path: ${{ matrix.path }}
    secrets: inherit
