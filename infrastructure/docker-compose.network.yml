services:  
  caddy:
    image: lucaslorentz/caddy-docker-proxy:latest
    networks:
      - caddy-network
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    environment:
      - CADDY_INGRESS_NETWORKS=caddy-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - caddy_data:/data
networks:
  caddy-network:
    name: caddy-network
    attachable: true
    driver: overlay

  private:
    attachable: true
    driver: overlay

volumes:
  caddy_data: {}