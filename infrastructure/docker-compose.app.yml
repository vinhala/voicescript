services:
  api:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/backend:latest
    environment:
      - PORT=80
      - OPENAI_API_KEY=${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      - OPENAI_TRANSCRIPTION_MODEL=${OPENAI_TRANSCRIPTION_MODEL:-gpt-4o-transcribe-diarize}
      - OPENAI_ANALYSIS_MODEL=${OPENAI_ANALYSIS_MODEL:-gpt-4.1-mini}
      - TWENTY_API_URL=${TWENTY_API_URL:-http://twenty-server:3000/rest}
      - TWENTY_API_KEY=${TWENTY_API_KEY:?TWENTY_API_KEY is required}
      - MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES:-26214400}
    networks:
      - private
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/frontend:latest
    environment:
      - PORT=80
      - HOST=0.0.0.0
      - NUXT_BACKEND_BASE_URL=http://api:80
    networks:
      - caddy-network
      - private
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
      labels:
        caddy: ${FRONTEND_URL:?FRONTEND_URL is required}
        caddy.reverse_proxy: "{{upstreams 80}}"
